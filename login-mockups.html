<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Design Options</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#111;color:#fff}
.nav{position:sticky;top:0;z-index:100;display:flex;background:#000;border-bottom:1px solid #333}
.nav button{flex:1;padding:16px;border:none;font-size:13px;font-weight:600;cursor:pointer;color:#888;background:#000;border-bottom:3px solid transparent;font-family:Inter,sans-serif;transition:all .2s}
.nav button.active{color:#fff;border-bottom-color:#7C5CFC}
.nav button:hover{color:#ccc}
.mockup{display:none;height:calc(100vh - 53px);overflow:hidden;position:relative}
.mockup.active{display:flex}

/* ====== OPTION 1: STRIPE CLONE ====== */
/* Stripe's login: white/light page with animated gradient canvas behind everything.
   Card is borderless, centered. Very minimal. The gradient is a full-bleed
   WebGL canvas showing soft flowing colors. */
#opt1{align-items:center;justify-content:center;background:#f6f9fc;position:relative}
/* The canvas would go here — we simulate with CSS gradient animation */
#opt1 .stripe-bg{position:absolute;inset:0;background:linear-gradient(135deg,
  #e0e7ff 0%, #f0e6ff 15%, #e8f4f8 30%, #fce4ec 50%,
  #e8eaf6 65%, #f3e5f5 80%, #e0f2f1 100%);
  background-size:400% 400%;animation:stripeFlow 12s ease infinite;opacity:0.7}
@keyframes stripeFlow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
/* Stripe also has a noise texture overlay */
#opt1 .stripe-noise{position:absolute;inset:0;opacity:0.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px}
#opt1 .stripe-card{position:relative;z-index:1;width:400px;max-width:90%;text-align:center}
#opt1 .stripe-logo{margin-bottom:28px}
#opt1 .stripe-logo svg{width:40px;height:40px}
#opt1 .stripe-title{font-size:16px;font-weight:600;color:#3c4257;margin-bottom:24px}
#opt1 .stripe-field{margin-bottom:12px;text-align:left}
#opt1 .stripe-field label{display:block;font-size:13px;font-weight:500;color:#3c4257;margin-bottom:4px}
#opt1 .stripe-field input{width:100%;padding:10px 12px;border:1px solid #e0e6ed;border-radius:6px;font-size:14px;font-family:inherit;outline:none;background:#fff;color:#1a1a2e;box-shadow:0 1px 2px rgba(0,0,0,0.04);transition:border-color .15s,box-shadow .15s}
#opt1 .stripe-field input:focus{border-color:#635bff;box-shadow:0 0 0 3px rgba(99,91,255,0.12),0 1px 2px rgba(0,0,0,0.04)}
#opt1 .stripe-field input::placeholder{color:#8898aa}
#opt1 .stripe-btn{width:100%;padding:10px;border:none;border-radius:6px;background:#635bff;color:#fff;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:4px;transition:all .15s;box-shadow:0 1px 3px rgba(99,91,255,0.3)}
#opt1 .stripe-btn:hover{background:#5750e0;box-shadow:0 4px 12px rgba(99,91,255,0.3)}
#opt1 .stripe-footer{margin-top:24px;font-size:11px;color:#8898aa}
#opt1 .stripe-footer a{color:#635bff;text-decoration:none}

/* ====== OPTION 2: VERCEL / LINEAR MINIMAL ====== */
/* Pure white, no decoration, bold title, borderless card.
   Extreme minimalism. Black button. Tiny footer. */
#opt2{align-items:center;justify-content:center;background:#fff;flex-direction:column}
#opt2 .v-logo{position:absolute;top:24px;left:32px}
#opt2 .v-logo span{font-size:13px;font-weight:700;color:#000;letter-spacing:1px;text-transform:uppercase}
#opt2 .v-card{width:400px;max-width:90%;text-align:center}
#opt2 .v-title{font-size:28px;font-weight:700;color:#000;margin-bottom:32px;letter-spacing:-0.5px}
#opt2 .v-field{margin-bottom:16px;text-align:left}
#opt2 .v-field label{display:block;font-size:14px;font-weight:500;color:#111;margin-bottom:6px}
#opt2 .v-field input{width:100%;padding:12px 14px;border:1px solid #eaeaea;border-radius:8px;font-size:15px;font-family:inherit;outline:none;background:#fafafa;color:#111;transition:border-color .15s}
#opt2 .v-field input:focus{border-color:#000;background:#fff}
#opt2 .v-field input::placeholder{color:#999}
#opt2 .v-btn{width:100%;padding:12px;border:none;border-radius:8px;background:#000;color:#fff;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:8px;transition:background .15s}
#opt2 .v-btn:hover{background:#333}
#opt2 .v-footer{margin-top:32px;font-size:12px;color:#999}
#opt2 .v-secure{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);font-size:10px;color:#bbb;text-align:center;white-space:nowrap}
</style>
</head>
<body>

<div class="nav">
  <button class="active" onclick="show('1')">1 — Stripe Clone</button>
  <button onclick="show('2')">2 — Vercel / Linear Minimal</button>
</div>

<!-- OPTION 1: STRIPE CLONE -->
<div class="mockup active" id="opt1">
  <div class="stripe-bg"></div>
  <div class="stripe-noise"></div>
  <div class="stripe-card">
    <div class="stripe-logo">
      <!-- Simple Ergon mark -->
      <div style="width:44px;height:44px;background:#635bff;border-radius:10px;margin:0 auto;display:flex;align-items:center;justify-content:center">
        <span style="color:#fff;font-weight:700;font-size:18px;letter-spacing:1px">E</span>
      </div>
    </div>
    <div class="stripe-title">Sign in to Ergon Corporate Development</div>
    <div class="stripe-field">
      <label>Email</label>
      <input type="email" placeholder="name@ergon.com">
    </div>
    <div class="stripe-field">
      <label>Password</label>
      <input type="password" placeholder="Enter your password">
    </div>
    <button class="stripe-btn">Continue</button>
    <div class="stripe-footer">
      U.S. Propane Market Map<br>
      <span style="font-size:10px;color:#aab7c4">Confidential &bull; Ergon, Inc. &mdash; Jackson, Mississippi</span>
    </div>
  </div>
</div>

<!-- OPTION 2: VERCEL / LINEAR MINIMAL -->
<div class="mockup" id="opt2">
  <div class="v-logo">
    <span>Ergon</span>
  </div>
  <div class="v-card">
    <div class="v-title">Log in to your account</div>
    <div class="v-field">
      <label>Email Address</label>
      <input type="email" placeholder="name@ergon.com">
    </div>
    <div class="v-field">
      <label>Password</label>
      <input type="password" placeholder="">
    </div>
    <button class="v-btn">Continue</button>
    <div class="v-footer">
      U.S. Propane Market Map
    </div>
  </div>
  <div class="v-secure">Confidential &bull; Authorized Personnel Only &bull; Ergon, Inc. &mdash; Jackson, Mississippi</div>
</div>

<script>
function show(id){
  document.querySelectorAll('.mockup').forEach(m=>m.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('opt'+id).classList.add('active');
  document.querySelectorAll('.nav button')[id==='1'?0:1].classList.add('active');
}
</script>
</body>
</html>
